# Development stack: gimie-api running against the local gimie submodule.
#
# How it works:
#   - The image (docker/gimie-api.dev.Dockerfile) ships gimie's dependency tree pre-installed.
#   - ./modules/gimie is mounted at /gimie and installed *editable* (`pip install -e`),
#     so edits to the local gimie source take effect without rebuilding.
#   - ./modules/gimie-api/app is mounted at /app so API edits are live too.
#   - uvicorn --reload watches both source trees and restarts on change.
#
# Usage:
#   cp .env.example .env   # then add your GITHUB_TOKEN (and GITLAB_TOKEN if needed)
#   docker compose up --build
#   open http://localhost:45400/

services:
  gimie-api:
    build:
      context: .
      dockerfile: docker/gimie-api.dev.Dockerfile
    container_name: gimie-api-dev
    ports:
      - "45400:15400"
    volumes:
      # Live API source (FastAPI app)
      - ./modules/gimie-api/app:/app
      # Live local gimie source — installed editable at startup, overlaying the PyPI copy
      - ./modules/gimie:/gimie
    env_file:
      - .env
    # Overlay the mounted gimie as an editable package (deps already baked into the image),
    # then serve with autoreload watching both the API and gimie source.
    # NOTE: keep every line at the same indentation. With a folded scalar (>),
    # extra-indented lines keep their newlines, which would split the uvicorn
    # args into separate (failing) shell commands and leave uvicorn on its
    # defaults (127.0.0.1:8000) instead of 0.0.0.0:15400.
    command: >
      sh -c "pip install --no-deps -e /gimie &&
      uvicorn app.main:app
      --host 0.0.0.0
      --port 15400
      --reload
      --reload-dir /app
      --reload-dir /gimie/gimie"

  # Publiccode editor: static build (wasm compiled with Go inside the image),
  # served by nginx. The prefill button calls gimie-api at the build-time
  # default http://localhost:45400, reached from the user's browser via the
  # host-mapped port; gimie-api CORS already allows http://localhost:3000.
  publiccode-editor:
    build:
      context: ./modules/publiccode-editor
      dockerfile: Dockerfile
    container_name: publiccode-editor
    ports:
      - "3000:80"
    depends_on:
      - gimie-api
